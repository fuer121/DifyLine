    - data:
        selected: false
        title: 章节范围规范
        type: code
        code: |
          def main(book_id: int, start_chapter_index: int, end_chapter_index: int):
              try:
                  book_id = int(book_id)
                  start = int(start_chapter_index)
                  end = int(end_chapter_index)
              except Exception:
                  return {
                      "chapter_numbers": [],
                      "range_status": "error: book_id、start_chapter_index、end_chapter_index 必须是数字",
                  }

              if book_id <= 0:
                  return {
                      "chapter_numbers": [],
                      "range_status": "error: book_id 必须大于 0",
                  }

              if start <= 0 or end <= 0:
                  return {
                      "chapter_numbers": [],
                      "range_status": "error: 章节 sortid 必须大于 0",
                  }

              if end < start:
                  end = start

              total = end - start + 1
              if total > 100:
                  return {
                      "chapter_numbers": [],
                      "range_status": "error: 章节范围最多支持 100 章，请缩小 start_chapter_index 和 end_chapter_index 的范围",
                  }

              return {
                  "chapter_numbers": list(range(start, end + 1)),
                  "range_status": "ok",
              }
