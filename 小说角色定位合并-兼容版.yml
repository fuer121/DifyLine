    - data:
        selected: false
        title: 解析单章 JSON
        type: code
        code: |
          def main(text: str, current_chapter: int):
              import json
              import re

              raw = (text or "").strip()
              raw = re.sub(r"^```(?:json)?", "", raw).strip()
              raw = re.sub(r"```$", "", raw).strip()

              try:
                  data = json.loads(raw)
              except Exception:
                  data = {
                      "chapter_index": int(current_chapter),
                      "chapter_title": "",
                      "roles": [],
                      "parse_error": True,
                      "raw_text": raw[:1000],
                  }

              if not isinstance(data, dict):
                  data = {
                      "chapter_index": int(current_chapter),
                      "chapter_title": "",
                      "roles": [],
                  }

              if not isinstance(data.get("roles"), list):
                  data["roles"] = []

              return {
                  "chapter_result": json.dumps(data, ensure_ascii=False),
              }
        code_language: python3
