    - data:
        selected: false
        title: 最终格式化输出
        type: code
        code: |
          def main(text: str, range_status: str):
              import json
              import re

              if range_status != "ok":
                  return {"result": range_status}

              raw = (text or "").strip()
              raw = re.sub(r"^```(?:json)?", "", raw).strip()
              raw = re.sub(r"```$", "", raw).strip()

              try:
                  data = json.loads(raw)
              except Exception:
                  return {"result": raw}

              if not isinstance(data, list):
                  return {"result": json.dumps(data, ensure_ascii=False, indent=2)}

              result = []
              for item in data:
                  if not isinstance(item, dict):
                      continue
                  result.append({
                      "角色名": item.get("角色名") or item.get("name") or "",
                      "角色定位": item.get("角色定位") or item.get("position") or "边缘角色",
                      "判断依据": item.get("判断依据") or item.get("evidence") or [],
                  })

              rank = {"核心角色": 0, "重要角色": 1, "边缘角色": 2}
              result.sort(key=lambda x: (rank.get(x["角色定位"], 9), x["角色名"]))
              return {"result": json.dumps(result, ensure_ascii=False, indent=2)}
        code_language: python3
        variables:
