    - data:
        selected: false
        title: 章节范围校验与初始化
        type: code
        code: |
          def main(book_id: int, start_chapter_index: int, end_chapter_index: int):
              try:
                  book_id = int(book_id)
                  start = int(start_chapter_index)
                  end = int(end_chapter_index)
              except Exception:
                  return {
                      "is_valid": False,
                      "error_message": "book_id、start_chapter_index、end_chapter_index 必须是数字",
                      "chapter_numbers": [],
                      "total_chapters": 0,
                      "cursor": 0,
                      "role_state": "[]",
                  }

              if book_id <= 0:
                  return {
                      "is_valid": False,
                      "error_message": "book_id 必须大于 0",
                      "chapter_numbers": [],
                      "total_chapters": 0,
                      "cursor": 0,
                      "role_state": "[]",
                  }

              if start <= 0 or end <= 0:
                  return {
                      "is_valid": False,
                      "error_message": "章节 sortid 必须大于 0",
                      "chapter_numbers": [],
                      "total_chapters": 0,
                      "cursor": 0,
                      "role_state": "[]",
                  }

              if end < start:
                  end = start

              total = end - start + 1
              if total > 100:
                  return {
                      "is_valid": False,
                      "error_message": "章节范围最多支持 100 章，请缩小 start_chapter_index 和 end_chapter_index 的范围",
                      "chapter_numbers": [],
                      "total_chapters": 0,
                      "cursor": 0,
                      "role_state": "[]",
                  }

              chapter_numbers = list(range(start, end + 1))
              return {
                  "is_valid": True,
                  "error_message": "",
                  "chapter_numbers": chapter_numbers,
                  "total_chapters": total,
                  "cursor": 0,
                  "role_state": "[]",
              }
        code_language: python3
        variables:
        - value_selector:
          - '1000000000001'
          - book_id
          value_type: number
          variable: book_id
        - value_selector:
          - '1000000000001'
