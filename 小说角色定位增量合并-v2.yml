    - data:
        selected: false
        title: 单章角色分析
        type: llm
        isInLoop: true
        loop_id: '1000000000005'
        context:
          enabled: false
          variable_selector: []
        model:
          completion_params:
            temperature: 0.2
          mode: chat
          name: deepseek-chat
          provider: langgenius/deepseek/deepseek
        prompt_template:
        - id: single-system-prompt
          role: system
          text: |-
            你是小说角色识别与角色定位分析专家。你需要根据单章小说内容，识别本章中实际出现或被明确提及的角色，并判断每个角色在全书叙事中的阶段性定位。

            角色定位只能从以下三类选择：
            1. 核心角色：主角、主要反派、主要同伴、主要对手、长期驱动主线冲突或主线成长的人物。
            2. 重要角色：对本章或近期情节有明显推动作用，和核心角色存在明确关系，参与关键事件、冲突、任务、势力关系或重要信息传递的人物。
            3. 边缘角色：短暂出场、背景人物、工具性人物、路人、只被轻微提及，或目前缺少证据证明其重要性的人物。

            判断要求：
            - 只根据章节原文判断，不得脑补后续剧情。
            - 如果证据不足，优先判为较低定位。
